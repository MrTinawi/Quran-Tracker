<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة مونوبولي الحفظ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: #1a1a2e;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.header {
  width: 100%;
  text-align: center;
  padding: 15px 20px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  border-bottom: 3px solid #e94560;
  z-index: 10;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 900;
  color: #e94560;
  text-shadow: 2px 2px 0 #000;
  letter-spacing: 2px;
}
.header .subtitle {
  color: #aaa;
  font-size: 0.85rem;
  margin-top: 4px;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 1300px;
  padding: 8px 20px;
  gap: 10px;
  flex-wrap: wrap;
  z-index: 10;
}
.top-bar select, .top-bar button {
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  padding: 8px 16px;
  border: 2px solid #e94560;
  border-radius: 8px;
  background: #16213e;
  color: #fff;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.top-bar select:hover, .top-bar button:hover {
  background: #0f3460;
  transform: translateY(-1px);
}
.top-bar button.primary {
  background: #e94560;
  color: #fff;
  border-color: #e94560;
}
.top-bar button.primary:hover {
  background: #ff6b81;
}
.top-bar button.danger {
  background: #c0392b;
  border-color: #c0392b;
}
.top-bar button.danger:hover {
  background: #e74c3c;
}

.board-wrapper {
  position: relative;
  display: inline-block;
  margin: 10px auto;
  max-width: 95vw;
  border: 4px solid #e94560;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.board-wrapper img {
  display: block;
  max-width: 100%;
  height: auto;
  user-select: none;
  pointer-events: none;
}

.board-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.board-overlay > * {
  pointer-events: auto;
}

.character-token {
  position: absolute;
  font-size: 2.5vw;
  cursor: grab;
  z-index: 10;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  user-select: none;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 4%;
  height: 4%;
  transition: none;
  border-radius: 50%;
  background: rgba(22, 33, 62, 0.4);
}
.character-token:active {
  cursor: grabbing;
  transform: scale(1.4);
  z-index: 100;
  filter: drop-shadow(0 0 15px rgba(233,69,96,0.9));
}
.character-token.dragging {
  transform: scale(1.4);
  z-index: 100;
  filter: drop-shadow(0 0 15px rgba(233,69,96,0.9));
  opacity: 0.9;
}
.character-token .token-label {
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.55rem;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.8);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  display: none;
}
.character-token:hover .token-label {
  display: block;
}

.palette {
  width: 100%;
  max-width: 1300px;
  padding: 12px 20px;
  margin-top: 10px;
}
.palette h3 {
  text-align: center;
  color: #e94560;
  margin-bottom: 12px;
  font-size: 1rem;
}
.character-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}
.character-card {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: grab;
  transition: all 0.2s;
  min-width: 140px;
}
.character-card:hover {
  border-color: #e94560;
  background: #1a1a3e;
  transform: translateY(-2px);
}
.character-card .emoji {
  font-size: 1.8rem;
  width: 36px;
  text-align: center;
}
.character-card .info {
  flex: 1;
}
.character-card .info .name {
  font-weight: 800;
  font-size: 0.85rem;
  color: #fff;
}
.character-card .info .team {
  font-size: 0.7rem;
  color: #aaa;
}
.character-card .controls {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.character-card .controls button {
  font-family: 'Cairo', sans-serif;
  font-size: 0.6rem;
  padding: 2px 8px;
  border: 1px solid #555;
  border-radius: 4px;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  transition: all 0.2s;
}
.character-card .controls button:hover {
  background: #e94560;
  color: #fff;
  border-color: #e94560;
}

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open {
  display: flex;
}
.modal {
  background: #16213e;
  border: 3px solid #e94560;
  border-radius: 16px;
  padding: 30px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}
.modal h2 {
  color: #e94560;
  margin-bottom: 20px;
  font-size: 1.3rem;
}
.modal label {
  display: block;
  text-align: right;
  margin-bottom: 6px;
  font-weight: 700;
  color: #ccc;
  font-size: 0.85rem;
}
.modal input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 2px solid #0f3460;
  border-radius: 8px;
  background: #1a1a3e;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 0.9rem;
}
.modal input:focus {
  outline: none;
  border-color: #e94560;
}
.modal .btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 10px;
}
.modal .btn-row button {
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 8px;
  border: 2px solid #e94560;
  cursor: pointer;
  transition: all 0.2s;
}
.modal .btn-row .save {
  background: #e94560;
  color: #fff;
}
.modal .btn-row .cancel {
  background: transparent;
  color: #aaa;
  border-color: #555;
}
.modal .btn-row .save:hover { background: #ff6b81; }
.modal .btn-row .cancel:hover { background: #333; color: #fff; }

#statusMsg {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2ecc71;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-weight: 700;
  z-index: 2000;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.legend {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 8px 0;
}
.legend-item {
  font-size: 0.65rem;
  color: #888;
  display: flex;
  align-items: center;
  gap: 4px;
}

@media (max-width: 768px) {
  .header h1 { font-size: 1.2rem; }
  .character-card { min-width: 100px; padding: 8px 10px; }
  .character-card .emoji { font-size: 1.4rem; width: 28px; }
  .character-token { font-size: 4vw; width: 7%; height: 7%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎲 لعبة مونوبولي الحفظ</h1>
  <div class="subtitle">اسحب الشخصيات وضعها في أي مكان على اللوحة</div>
</div>

<div class="top-bar">
  <div style="display:flex;gap:8px;align-items:center;">
    <select id="classSelector" onchange="loadGame()">
      <option value="new_vision">نيو فيجن</option>
      <option value="choueifat">الشويفات</option>
    </select>
    <button class="primary" onclick="saveAll()">💾 حفظ الكل</button>
    <button onclick="loadGame()">🔄 تحديث</button>
    <span style="font-size:0.75rem;color:#888;" id="charCount"></span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="danger" onclick="confirmReset()">🔄 إعادة تعيين</button>
    <a href="/" style="color:#aaa;font-size:0.8rem;text-decoration:none;">← الرجوع للوحة القيادة</a>
  </div>
</div>

<div class="legend">
  <span class="legend-item">👆 اسحب الشخصيات من الأسفل وضعها في أي مكان</span>
  <span class="legend-item">📌 انقر نقراً مزدوجاً على شخصية لتعديل اسمها</span>
</div>

<div class="board-wrapper" id="boardWrapper">
  <img src="/board-image" alt="Monopoly Board" id="boardImg" draggable="false">
  <div class="board-overlay" id="boardOverlay"></div>
</div>

<div class="palette">
  <h3>🎭 الشخصيات — اسحب إلى اللوحة</h3>
  <div class="character-grid" id="characterGrid"></div>
</div>

<div class="modal-overlay" id="teamModal">
  <div class="modal">
    <h2>تعديل الشخصية</h2>
    <label>الشخصية</label>
    <input type="text" id="modalCharName" readonly disabled style="opacity:0.6;">
    <label>رمز</label>
    <input type="text" id="modalCharEmoji" readonly disabled style="opacity:0.6;text-align:center;font-size:2rem;">
    <label>اسم الفريق</label>
    <input type="text" id="modalTeamName" placeholder="مثال: الفريق الأول">
    <div class="btn-row">
      <button class="save" onclick="saveCharacterFromModal()">💾 حفظ</button>
      <button class="cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<div id="statusMsg"></div>

<script>
const BOARD_W = 1280;
const BOARD_H = 1277;

const CHARACTERS = [
  { name: 'crown',       emoji: '👑',  label: 'التاج' },
  { name: 'padel',       emoji: '🏓',  label: 'مضرب البادل' },
  { name: 'gold_coin',   emoji: '🪙',  label: 'عملة ذهبية' },
  { name: 'car',         emoji: '🚗',  label: 'السيارة' },
  { name: 'book',        emoji: '📖',  label: 'الكتاب' },
  { name: 'star',        emoji: '⭐',  label: 'النجمة' },
];

let gameState = {};
let dragData = null;

function getClass() {
  return document.getElementById('classSelector').value;
}

function showStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.style.background = isError ? '#e74c3c' : '#2ecc71';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

async function loadGame() {
  const cls = getClass();
  try {
    const res = await fetch(`/api/game/state?class=${encodeURIComponent(cls)}`);
    const data = await res.json();
    gameState = {};
    for (const ch of data) {
      gameState[ch.character_name] = {
        team_name: ch.team_name || '',
        pos_x: ch.pos_x != null ? ch.pos_x : 640,
        pos_y: ch.pos_y != null ? ch.pos_y : 638,
        character_emoji: ch.character_emoji,
      };
    }
    renderBoard();
    renderPalette();
  } catch (e) {
    console.error('Load error:', e);
    showStatus('خطأ في تحميل حالة اللعبة', true);
  }
}

async function saveAll() {
  const cls = getClass();
  const payload = [];
  for (const ch of CHARACTERS) {
    const state = gameState[ch.name];
    payload.push({
      character_name: ch.name,
      character_emoji: ch.emoji,
      team_name: state ? state.team_name : '',
      pos_x: state ? state.pos_x : 640,
      pos_y: state ? state.pos_y : 638,
    });
  }
  try {
    const res = await fetch(`/api/game/state?class=${encodeURIComponent(cls)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ characters: payload }),
    });
    const result = await res.json();
    if (result.success) {
      showStatus('✅ تم حفظ جميع الشخصيات!');
    } else {
      showStatus('❌ ' + (result.error || 'خطأ في الحفظ'), true);
    }
  } catch (e) {
    showStatus('❌ خطأ في الاتصال', true);
  }
}

async function confirmReset() {
  if (!confirm('هل أنت متأكد؟ سيتم إعادة تعيين مواقع جميع الشخصيات.')) return;
  const cls = getClass();
  try {
    await fetch(`/api/game/reset?class=${encodeURIComponent(cls)}`, { method: 'POST' });
    await fetch(`/api/game/seed?class=${encodeURIComponent(cls)}`, { method: 'POST' });
    showStatus('✅ تم إعادة التعيين');
    loadGame();
  } catch (e) {
    showStatus('❌ خطأ في إعادة التعيين', true);
  }
}

function getImgRect() {
  const img = document.getElementById('boardImg');
  return img.getBoundingClientRect();
}

function screenToBoard(clientX, clientY) {
  const r = getImgRect();
  return {
    x: (clientX - r.left) / r.width * BOARD_W,
    y: (clientY - r.top) / r.height * BOARD_H,
  };
}

function renderBoard() {
  const overlay = document.getElementById('boardOverlay');
  overlay.innerHTML = '';

  const count = document.getElementById('charCount');
  const placed = Object.keys(gameState).length;
  if (count) count.textContent = `${placed}/6 شخصيات موضوعة`;

  for (const ch of CHARACTERS) {
    const state = gameState[ch.name];
    if (!state) continue;

    const pctX = (state.pos_x / BOARD_W * 100);
    const pctY = (state.pos_y / BOARD_H * 100);

    const token = document.createElement('div');
    token.className = 'character-token';
    token.dataset.charName = ch.name;
    token.textContent = ch.emoji;
    token.style.left = pctX + '%';
    token.style.top = pctY + '%';
    token.style.transform = 'translate(-50%, -50%)';

    const label = document.createElement('span');
    label.className = 'token-label';
    label.textContent = state.team_name || ch.label;
    token.appendChild(label);

    token.addEventListener('mousedown', (e) => startDrag(e, ch.name));
    token.addEventListener('touchstart', (e) => startDragTouch(e, ch.name), { passive: false });
    token.addEventListener('dblclick', () => editCharacter(ch.name));

    overlay.appendChild(token);
  }
}

function renderPalette() {
  const grid = document.getElementById('characterGrid');
  grid.innerHTML = '';

  for (const ch of CHARACTERS) {
    const state = gameState[ch.name];
    const card = document.createElement('div');
    card.className = 'character-card';
    card.dataset.charName = ch.name;

    card.innerHTML = `
      <div class="emoji">${ch.emoji}</div>
      <div class="info">
        <div class="name">${ch.label}</div>
        <div class="team">${state ? (state.team_name || 'غير معين') : 'غير معين'}</div>
      </div>
      <div class="controls">
        <button onclick="editCharacter('${ch.name}')" title="تعديل">✏️</button>
        <button onclick="removeCharacter('${ch.name}')" title="إزالة">🗑️</button>
      </div>
    `;

    card.addEventListener('mousedown', (e) => startDragPalette(e, ch.name));
    card.addEventListener('touchstart', (e) => startDragPaletteTouch(e, ch.name), { passive: false });

    grid.appendChild(card);
  }
}

// ─── Drag & Drop ───

function startDrag(e, charName) {
  if (e.button !== 0) return;
  e.preventDefault();
  const token = e.currentTarget;
  dragData = { charName, token, fromBoard: true };
  token.classList.add('dragging');
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function startDragTouch(e, charName) {
  e.preventDefault();
  const token = e.currentTarget;
  dragData = { charName, token, fromBoard: true };
  token.classList.add('dragging');
  document.addEventListener('touchmove', onDragTouch, { passive: false });
  document.addEventListener('touchend', endDragTouch, { passive: false });
}

function startDragPalette(e, charName) {
  if (e.button !== 0) return;
  e.preventDefault();
  dragData = { charName, token: null, fromBoard: false };
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function startDragPaletteTouch(e, charName) {
  e.preventDefault();
  dragData = { charName, token: null, fromBoard: false };
  document.addEventListener('touchmove', onDragTouch, { passive: false });
  document.addEventListener('touchend', endDragTouch, { passive: false });
}

function onDrag(e) {
  if (!dragData) return;
  showGhost(e.clientX, e.clientY);
}

function onDragTouch(e) {
  if (!dragData) return;
  e.preventDefault();
  const touch = e.touches[0];
  showGhost(touch.clientX, touch.clientY);
}

function showGhost(clientX, clientY) {
  // Move existing token on board
  if (dragData.token) {
    const r = getImgRect();
    const pctX = (clientX - r.left) / r.width * 100;
    const pctY = (clientY - r.top) / r.height * 100;
    dragData.token.style.left = pctX + '%';
    dragData.token.style.top = pctY + '%';
    dragData.token.style.transform = 'translate(-50%, -50%)';
  } else {
    // Show floating ghost when dragging from palette
    let ghost = document.getElementById('dragGhost');
    if (!ghost) {
      ghost = document.createElement('div');
      ghost.id = 'dragGhost';
      ghost.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;font-size:3rem;filter:drop-shadow(0 0 10px rgba(233,69,96,0.8));transform:translate(-50%,-50%);';
      document.body.appendChild(ghost);
    }
    const ch = CHARACTERS.find(c => c.name === dragData.charName);
    ghost.textContent = ch ? ch.emoji : '?';
    ghost.style.left = clientX + 'px';
    ghost.style.top = clientY + 'px';
    ghost.style.display = 'block';
  }
}

function endDrag(e) {
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  finishDrag(e.clientX, e.clientY);
}

function endDragTouch(e) {
  document.removeEventListener('touchmove', onDragTouch);
  document.removeEventListener('touchend', endDragTouch);
  const touch = e.changedTouches[0];
  finishDrag(touch.clientX, touch.clientY);
}

function finishDrag(clientX, clientY) {
  const ghost = document.getElementById('dragGhost');
  if (ghost) ghost.style.display = 'none';

  const r = getImgRect();
  const isInside =
    clientX >= r.left && clientX <= r.right &&
    clientY >= r.top && clientY <= r.bottom;

  if (isInside || dragData.fromBoard) {
    const boardPos = screenToBoard(clientX, clientY);
    // Clamp to board
    const px = Math.max(0, Math.min(boardPos.x, BOARD_W));
    const py = Math.max(0, Math.min(boardPos.y, BOARD_H));
    setCharacterPosition(dragData.charName, px, py);
  } else if (!dragData.fromBoard) {
    // Dropped from palette outside board — place at center
    setCharacterPosition(dragData.charName, BOARD_W / 2, BOARD_H / 2);
  }

  if (dragData.token) {
    dragData.token.classList.remove('dragging');
  }
  dragData = null;
}

function setCharacterPosition(charName, px, py) {
  if (!gameState[charName]) {
    const ch = CHARACTERS.find(c => c.name === charName);
    gameState[charName] = {
      team_name: ch ? ch.label : '',
      pos_x: px,
      pos_y: py,
      character_emoji: ch ? ch.emoji : '?',
    };
  } else {
    gameState[charName].pos_x = px;
    gameState[charName].pos_y = py;
  }
  renderBoard();
  renderPalette();
}

function removeCharacter(charName) {
  if (!gameState[charName]) return;
  delete gameState[charName];
  renderBoard();
  renderPalette();
  showStatus(`تمت إزالة ${CHARACTERS.find(c=>c.name===charName)?.label}`);
}

function editCharacter(charName) {
  const ch = CHARACTERS.find(c => c.name === charName);
  const state = gameState[charName];
  document.getElementById('modalCharName').value = ch ? ch.label : charName;
  document.getElementById('modalCharName').dataset.name = charName;
  document.getElementById('modalCharEmoji').value = ch ? ch.emoji : '?';
  document.getElementById('modalTeamName').value = state ? (state.team_name || '') : '';
  document.getElementById('teamModal').classList.add('open');
}

function closeModal() {
  document.getElementById('teamModal').classList.remove('open');
}

function saveCharacterFromModal() {
  const name = document.getElementById('modalCharName').dataset.name;
  const teamName = document.getElementById('modalTeamName').value.trim();
  if (!gameState[name]) {
    const ch = CHARACTERS.find(c => c.name === name);
    gameState[name] = {
      team_name: teamName || (ch ? ch.label : ''),
      pos_x: BOARD_W / 2,
      pos_y: BOARD_H / 2,
      character_emoji: ch ? ch.emoji : '?',
    };
  } else {
    gameState[name].team_name = teamName;
  }
  closeModal();
  renderBoard();
  renderPalette();
  saveAll();
}

document.addEventListener('DOMContentLoaded', () => {
  loadGame();
});
</script>
</body>
</html>
