name: Update Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export dashboard data
        run: python export_dashboard.py

      - name: Push to dashboard repo
        env:
          PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          git clone https://MrTinawi:$PAT@github.com/MrTinawi/Quran-Tracker-Dashboard.git /tmp/dash
          cp index.html /tmp/dash/index.html
          cd /tmp/dash
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://MrTinawi:$PAT@github.com/MrTinawi/Quran-Tracker-Dashboard.git
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "auto-update dashboard"
          git push
